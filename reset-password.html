<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SonicForge AI — 重置密码</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Noto+Sans+SC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#08080c;--bg2:#0e0e14;--bg3:#16161f;--text:#e8e6f0;--text2:#9896a8;--text3:#5c5a6e;--cyan:#00f0ff;--magenta:#ff2d8a;--lime:#a8ff00;--radius:16px;--font-display:'Outfit','Noto Sans SC',sans-serif;--font-body:'Noto Sans SC','Outfit',sans-serif;--font-mono:'JetBrains Mono',monospace}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;display:flex;align-items:center;justify-content:center}

.reset-box{background:var(--bg2);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius);padding:40px;max-width:420px;width:90%;text-align:center}
.reset-box h2{font-family:var(--font-display);font-size:1.6rem;font-weight:700;margin-bottom:8px}
.reset-box p{color:var(--text2);font-size:.9rem;margin-bottom:24px;line-height:1.6}
.reset-box .form-group{margin-bottom:16px;text-align:left}
.reset-box label{display:block;font-size:.85rem;color:var(--text2);margin-bottom:6px}
.reset-box input{width:100%;padding:12px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.08);background:var(--bg);color:var(--text);font-size:.9rem;font-family:var(--font-body);outline:none;transition:border-color .2s}
.reset-box input:focus{border-color:var(--cyan)}
.reset-box input::placeholder{color:var(--text3)}
.reset-box .submit-btn{width:100%;padding:14px;border-radius:8px;background:linear-gradient(135deg,var(--cyan),#00b4d8);color:var(--bg);font-weight:700;font-size:1rem;border:none;cursor:pointer;transition:all .3s;font-family:var(--font-body);margin-top:8px}
.reset-box .submit-btn:hover{box-shadow:0 8px 30px rgba(0,240,255,.3)}
.reset-box .submit-btn:disabled{opacity:.6;cursor:not-allowed}
.reset-box .error-msg{color:var(--magenta);font-size:.85rem;margin-top:8px;display:none}
.reset-box .success-msg{color:var(--lime);font-size:.85rem;margin-top:8px;display:none}
.reset-box .back-link{margin-top:16px;font-size:.85rem;color:var(--text3)}
.reset-box .back-link a{color:var(--cyan);text-decoration:none}
</style>
</head>
<body>
<div class="reset-box">
  <h2 id="title">重置密码</h2>
  <p id="desc">输入你的新密码</p>
  
  <div id="resetForm">
    <div class="form-group">
      <label>新密码</label>
      <input type="password" id="newPassword" placeholder="至少8位">
    </div>
    <div class="form-group">
      <label>确认新密码</label>
      <input type="password" id="confirmPassword" placeholder="再次输入">
    </div>
    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>
    <button class="submit-btn" id="submitBtn" onclick="resetPassword()">确认重置</button>
  </div>
  
  <div id="doneForm" style="display:none">
    <div style="font-size:3rem;margin-bottom:16px">✅</div>
    <p style="font-size:1rem;color:var(--text)">密码重置成功！</p>
    <a href="studio.html"><button class="submit-btn">进入工作室</button></a>
  </div>
  
  <div class="back-link"><a href="studio.html">← 返回首页</a></div>
</div>

<script>
const SUPABASE_URL = 'https://edybhreonjracsvnjedr.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkeWJocmVvbmpyYWNzdm5qZWRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyNDM1NzMsImV4cCI6MjA5NzgxOTU3M30.DD4luizUgvMEwiAa5PJVWNRNeUEqKkWoH2Mzb2JRRfI';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// 检查是否有有效的重置密码会话
async function checkSession() {
  const { data: { session }, error } = await db.auth.getSession();
  if (!session) {
    document.getElementById('title').textContent = '链接无效';
    document.getElementById('desc').textContent = '重置密码链接无效或已过期，请重新申请。';
    document.getElementById('resetForm').style.display = 'none';
    document.getElementById('doneForm').style.display = 'none';
    document.getElementById('errorMsg').style.display = 'block';
    document.getElementById('errorMsg').style.color = 'var(--magenta)';
    document.getElementById('errorMsg').textContent = '请返回工作室页面重新申请密码重置。';
  }
}
checkSession();

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('successMsg').style.display = 'none';
}

async function resetPassword() {
  const pw = document.getElementById('newPassword').value;
  const pw2 = document.getElementById('confirmPassword').value;
  
  if (!pw) { showError('请输入新密码'); return; }
  if (pw.length < 8) { showError('密码至少8位'); return; }
  if (pw !== pw2) { showError('两次密码输入不一致'); return; }
  
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '处理中...';
  document.getElementById('errorMsg').style.display = 'none';
  
  const { error } = await db.auth.updateUser({ password: pw });
  
  if (error) {
    showError(error.message);
    btn.disabled = false;
    btn.textContent = '确认重置';
  } else {
    document.getElementById('resetForm').style.display = 'none';
    document.getElementById('doneForm').style.display = 'block';
  }
}
</script>
</body>
</html>
