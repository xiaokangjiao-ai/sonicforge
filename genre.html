<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#08080c;--bg2:#0e0e14;--bg3:#16161f;--text:#e8e6f0;--text2:#9896a8;--text3:#5c5a6e;--cyan:#00f0ff;--magenta:#ff2d8a;--amber:#ffb300;--lime:#a8ff00;--radius:16px;--radius-sm:10px;--font-display:'Outfit','Noto Sans SC',sans-serif;--font-body:'Noto Sans SC','Outfit',sans-serif;--font-mono:'JetBrains Mono',monospace}
html{scroll-behavior:smooth;font-size:16px}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);overflow-x:hidden;line-height:1.6}
::selection{background:var(--cyan);color:var(--bg)}
a{color:inherit;text-decoration:none}

.nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:16px 48px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(20px);background:rgba(8,8,12,.85);border-bottom:1px solid rgba(255,255,255,.04)}
.nav-logo{font-family:var(--font-display);font-weight:800;font-size:1.3rem;display:flex;align-items:center;gap:10px;cursor:pointer}
.nav-logo .dot{width:8px;height:8px;border-radius:50%;background:var(--cyan);box-shadow:0 0 10px var(--cyan)}
.nav-back{padding:8px 20px;border-radius:100px;border:1px solid rgba(255,255,255,.12);background:transparent;color:var(--text2);font-size:.85rem;cursor:pointer;transition:all .2s;font-family:var(--font-body)}
.nav-back:hover{border-color:var(--text);color:var(--text)}

.genre-page{padding:100px 48px 60px;max-width:1000px;margin:0 auto}
.genre-hero{display:flex;align-items:center;gap:24px;margin-bottom:48px}
.genre-icon-lg{width:80px;height:80px;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:2.5rem}
.genre-hero h1{font-family:var(--font-display);font-size:2.5rem;font-weight:800;letter-spacing:-.02em}
.genre-hero .sub{color:var(--text2);font-size:1rem;margin-top:4px}

.genre-desc{background:var(--bg2);border:1px solid rgba(255,255,255,.05);border-radius:var(--radius);padding:32px;margin-bottom:32px}
.genre-desc h2{font-family:var(--font-display);font-size:1.3rem;font-weight:700;margin-bottom:12px}
.genre-desc p{color:var(--text2);font-size:.95rem;line-height:1.8}

/* Sub-genres */
.sub-genres{margin-bottom:32px}
.sub-genres h2{font-family:var(--font-display);font-size:1.3rem;font-weight:700;margin-bottom:16px}
.sub-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.sub-card{padding:20px;border-radius:var(--radius-sm);background:var(--bg2);border:1px solid rgba(255,255,255,.05);cursor:pointer;transition:all .2s;text-align:center}
.sub-card:hover{border-color:rgba(255,255,255,.15);transform:translateY(-2px)}
.sub-card .name{font-weight:600;font-size:.95rem;margin-bottom:4px}
.sub-card .bpm{font-family:var(--font-mono);font-size:.75rem;color:var(--text3)}

/* Audio samples */
.samples{margin-bottom:32px}
.samples h2{font-family:var(--font-display);font-size:1.3rem;font-weight:700;margin-bottom:16px}
.sample-list{display:flex;flex-direction:column;gap:12px}
.sample-item{display:flex;align-items:center;gap:16px;padding:16px 20px;border-radius:var(--radius-sm);background:var(--bg2);border:1px solid rgba(255,255,255,.05);cursor:pointer;transition:all .2s}
.sample-item:hover{border-color:rgba(255,255,255,.1)}
.sample-play{width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.sample-item:hover .sample-play{border-color:var(--cyan);background:rgba(0,240,255,.08)}
.sample-play svg{width:14px;height:14px;fill:var(--text2)}
.sample-item:hover .sample-play svg{fill:var(--cyan)}
.sample-info{flex:1}
.sample-title{font-weight:500;font-size:.9rem}
.sample-meta{font-size:.75rem;color:var(--text3);margin-top:2px}
.sample-dur{font-family:var(--font-mono);font-size:.8rem;color:var(--text3)}

/* Characteristics */
.chars{margin-bottom:32px}
.chars h2{font-family:var(--font-display);font-size:1.3rem;font-weight:700;margin-bottom:16px}
.char-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.char-item{padding:16px;border-radius:var(--radius-sm);background:var(--bg2);border:1px solid rgba(255,255,255,.05);text-align:center}
.char-item .val{font-family:var(--font-display);font-size:1.5rem;font-weight:700;margin-bottom:4px}
.char-item .label{font-size:.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}

/* CTA */
.genre-cta{text-align:center;padding:40px;background:var(--bg2);border-radius:var(--radius);border:1px solid rgba(255,255,255,.05)}
.genre-cta h3{font-family:var(--font-display);font-size:1.4rem;font-weight:700;margin-bottom:8px}
.genre-cta p{color:var(--text2);font-size:.9rem;margin-bottom:20px}
.genre-cta .btn{padding:14px 36px;border-radius:100px;background:linear-gradient(135deg,var(--cyan),#00b4d8);color:var(--bg);font-weight:700;font-size:.95rem;border:none;cursor:pointer;transition:all .3s;font-family:var(--font-body)}
.genre-cta .btn:hover{box-shadow:0 8px 30px rgba(0,240,255,.3);transform:translateY(-2px)}

@media(max-width:700px){
  .genre-page{padding:80px 20px 40px}
  .genre-hero{flex-direction:column;text-align:center}
  .genre-hero h1{font-size:1.8rem}
  .nav{padding:14px 20px}
}
</style>

  classical:  { root: 261, wave: 'triangle', scale: [0,2,4,5,7,9,11], bpm: 90, attack: 0.08, release: 0.4 },
  hiphop:     { root: 55,  wave: 'square',   scale: [0,3,5,7,10,12], bpm: 90, attack: 0.005, release: 0.04 },
  lofi:       { root: 196, wave: 'sine',     scale: [0,2,3,5,7,9], bpm: 78, attack: 0.06, release: 0.35 },
  cinematic:  { root: 73,  wave: 'sawtooth', scale: [0,2,4,7,12], bpm: 80, attack: 0.25, release: 0.6 },
  pop:        { root: 261, wave: 'square',   scale: [0,2,4,5,7,9,12], bpm: 120, attack: 0.01, release: 0.12 },
  ambient:    { root: 130, wave: 'sine',     scale: [0,5,7,12,17], bpm: 60, attack: 0.4, release: 1.2 }
};

function generateSample(genre, durSec) {
  const ctx = getCtx();
  const sr = ctx.sampleRate;
  const len = Math.floor(durSec * sr);
  const buf = ctx.createBuffer(2, len, sr);
  const L = buf.getChannelData(0);
  const R = buf.getChannelData(1);
  const cfg = GENRE_AUDIO[genre] || GENRE_AUDIO.electronic;
  const beatDur = 60 / cfg.bpm;
  const rootMidi = Math.round(12 * Math.log2(cfg.root / 440)) + 69;
  let seed = genre.charCodeAt(0) * 1000 + Date.now() % 10000;
  function rand() { seed = (seed * 16807) % 2147483647; return (seed - 1) / 2147483646; }

  // Melody
  let t = 0;
  while (t < durSec) {
    const noteIdx = cfg.scale[Math.floor(rand() * cfg.scale.length)];
    const freq = 440 * Math.pow(2, (rootMidi + noteIdx - 69) / 12);
    const noteDur = beatDur * (0.5 + rand() * 0.5);
    const start = Math.floor(t * sr);
    const end = Math.min(len, Math.floor((t + noteDur) * sr));
    for (let i = 0; i < end - start; i++) {
      const env = Math.min(1, i / (sr * cfg.attack)) * Math.min(1, (end - start - i) / (sr * cfg.release));
      const phase = (freq * (start + i)) / sr;
      let s = cfg.wave === 'sine' ? Math.sin(2*Math.PI*phase) :
              cfg.wave === 'sawtooth' ? 2*(phase%1)-1 :
              cfg.wave === 'square' ? ((phase%1)<0.5?1:-1) :
              4*Math.abs((phase%1)-0.5)-1;
      s += 0.2 * Math.sin(2*Math.PI*phase*2);
      const val = s * env * 0.12;
      L[start+i] += val; R[start+i] += val * 0.9;
    }
    t += noteDur;
  }
  // Pad
  t = 0;
  while (t < durSec) {
    const chordNotes = [0, 4, 7].map(i => cfg.scale[Math.min(i, cfg.scale.length-1)]);
    const start = Math.floor(t * sr);
    const end = Math.min(len, Math.floor((t + beatDur * 4) * sr));
    for (let n = 0; n < chordNotes.length; n++) {
      const freq = 440 * Math.pow(2, (rootMidi + chordNotes[n] - 69) / 12);
      for (let i = 0; i < end - start; i++) {
        const env = Math.min(1, i/(sr*0.3)) * Math.min(1, (end-start-i)/(sr*0.3));
        const s = Math.sin(2*Math.PI*freq*(start+i)/sr);
        L[start+i] += s * env * 0.04; R[start+i] += s * env * 0.04;
      }
    }
    t += beatDur * 4;
  }
  // Master
  for (let i = 0; i < len; i++) {
    L[i] = Math.tanh(L[i] * 2) * 0.7;
    R[i] = Math.tanh(R[i] * 2) * 0.7;
  }
  return buf;
}

function playSample(el) {
  // Stop current playback
  if (currentSource) {
    try { currentSource.stop(); } catch(e) {}
    currentSource.disconnect();
    currentSource = null;
  }
  if (currentEl) {
    currentEl.style.borderColor = '';
    currentEl.querySelector('.sample-play svg').innerHTML = '<polygon points="8,5 19,12 8,19"/>';
  }
  // If clicking same element, just stop
  if (currentEl === el) {
    currentEl = null;
    isPlaying = false;
    return;
  }
  // Generate and play
  const buf = generateSample(genreKey, 5);
  const ctx = getCtx();
  currentSource = ctx.createBufferSource();
  currentSource.buffer = buf;
  currentSource.connect(ctx.destination);
  currentSource.start();
  currentEl = el;
  isPlaying = true;

  // Visual feedback
  el.style.borderColor = data.color;
  el.querySelector('.sample-play svg').innerHTML = '<rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/>';
  currentSource.onended = () => {
    el.style.borderColor = '';
    el.querySelector('.sample-play svg').innerHTML = '<polygon points="8,5 19,12 8,19"/>';
    currentSource = null;
    currentEl = null;
    isPlaying = false;
  };
}
</script>
